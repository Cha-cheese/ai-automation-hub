<!DOCTYPE html>
<html>
<head>
  <title>AI Automation Hub</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 500px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    pre {
      background: #0f172a;
      padding: 10px;
      margin-top: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>🧠 AI Automation Hub</h2>

    <input id="msg" placeholder="Type: read email and notify slack" />

    <button onclick="send()">Send</button>

    <pre id="output"></pre>
  </div>

<script>
async function send() {
  const msg = document.getElementById("msg").value;

  const res = await fetch("http://127.0.0.1:8000/automate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
