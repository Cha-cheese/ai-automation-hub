<!DOCTYPE html>
<html>
<head>
    <title>AI Automation Hub</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        input, button, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🤖 AI Automation Hub</h1>

    <h3>Login</h3>

    <input id="username" placeholder="username" value="admin">
    <input id="password" placeholder="password" value="admin123">

    <button onclick="login()">Login</button>

    <hr>

    <h3>Send Automation Request</h3>

    <textarea id="message" rows="5" placeholder="Type message..."></textarea>

    <button onclick="sendMessage()">Run Automation</button>

    <div id="result"></div>

</div>

<script>

let token = "";

async function login() {

    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await response.json();

    token = data.token;

    document.getElementById("result").innerText =
        "✅ Logged in\nToken:\n" + token;
}

async function sendMessage() {

    const message = document.getElementById("message").value;

    const response = await fetch("/automate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({
            message: message
        })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
