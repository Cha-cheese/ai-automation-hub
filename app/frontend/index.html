<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Automation Hub</title>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:40px;
}

textarea{
width:100%;
height:120px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

pre{
background:#f4f4f4;
padding:15px;
border-radius:10px;
overflow:auto;
}
</style>

</head>

<body>

<h1>🧠 AI Automation Hub</h1>

<textarea id="message"
placeholder="read email and schedule meeting">
</textarea>

<br>

<button onclick="sendRequest()">
Send
</button>

<h2>Result</h2>

<pre id="result"></pre>

<script>

async function sendRequest(){

const msg =
document.getElementById("message").value;

const response =
await fetch("/automate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:msg
})
});

const data =
await response.json();

document.getElementById("result")
.textContent =
JSON.stringify(data,null,2);

}

</script>

</body>
</html>
